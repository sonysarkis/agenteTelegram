services:
  - type: web
    name: agente-telegram-pm
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: PORT
        value: "5000"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOSS_USER_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: WEBHOOK_URL
        sync: false
